<div class="modal fade show" tabindex="-1" style="display: block; background-color: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-light border-secondary shadow-lg">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">{{ title }}</h5>
        <button type="button" class="btn-close btn-close-white" aria-label="Close" (click)="onCancel()"></button>
      </div>
      <div class="modal-body py-4">
        <p class="mb-0">{{ message }}</p>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-outline-light px-4" (click)="onCancel()">Cancelar</button>
        <button type="button" class="btn btn-danger px-4" (click)="onConfirm()">Confirmar</button>
      </div>
    </div>
  </div>
</div>
