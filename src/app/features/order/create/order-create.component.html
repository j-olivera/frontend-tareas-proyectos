<!-- order-create.component.html -->
<div class="page">
  
  <!-- Header con Email del Usuario -->
  <div class="user-header">
    <button class="btn-user">
      <i class="fas fa-user-circle"></i>
      <span>{{ userEmail }}</span>
    </button>
  </div>

  <!-- Contenedor de Toasts -->
  <div class="toast-container" *ngIf="toast.show" [class.toast--error]="toast.type === 'error'">
    <div class="toast-content">
      <i class="fas" [ngClass]="toast.type === 'success' ? 'fa-check-circle' : 'fa-times-circle'"></i>
      <span>{{ toast.message }}</span>
    </div>
    <div class="toast-progress"></div>
  </div>

  <div class="card">
    <!-- Header -->
    <div class="card__header">
      <span class="card__logo">📦</span>
      <h1 class="card__title">Nueva Orden</h1>
      <p class="card__subtitle">Tasks &amp; Projects — Registrar pedido</p>
    </div>

    <!-- Formulario -->
    <form [formGroup]="orderForm" (ngSubmit)="onSubmit()" novalidate class="form">
      
      <!-- Amount -->
      <div class="field" [class.field--error]="isFieldInvalid('amount')">
        <label class="field__label" for="amount">Monto</label>
        <input 
          id="amount" 
          type="number" 
          class="field__input" 
          formControlName="amount"
          placeholder="Ej: 453.23" 
        />
        <span class="field__error" *ngIf="isFieldInvalid('amount')">
          <span *ngIf="amountControl?.errors?.['required']">El monto es requerido.</span>
          <span *ngIf="amountControl?.errors?.['min']">El monto debe ser mayor a 0.</span>
          <span *ngIf="amountControl?.errors?.['pattern']">Ingrese un monto válido.</span>
        </span>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit" [disabled]="orderForm.invalid || isLoading">
        <span *ngIf="!isLoading">Crear Orden</span>
        <span *ngIf="isLoading">Creando Orden...</span>
      </button>

      <!-- Enlace a listado -->
      <div class="card__footer">
        <a routerLink="/order-view" class="link-orders">
          Ver tus ordenes
          <i class="fas fa-chevron-right"></i>
        </a>
      </div>

    </form>
  </div>
  
  <app-logout></app-logout>
</div>
