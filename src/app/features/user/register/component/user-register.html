<!-- register.component.html -->
<div class="page">
    <div class="card">

        <!-- Header -->
        <div class="card__header">
            <span class="card__logo">⬡</span>
            <h1 class="card__title">Crear cuenta</h1>
            <p class="card__subtitle">Tasks &amp; Projects — empezá gratis</p>
        </div>

        <!-- Mensaje de éxito -->
        <div *ngIf="successMessage" class="alert alert--success" role="alert">
            ✓ {{ successMessage }}
        </div>

        <!-- Formulario -->
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate class="form" *ngIf="!successMessage">

            <!-- Email -->
            <div class="field" [class.field--error]="isFieldInvalid(email) || serverErrors.email">
                <label class="field__label" for="email">Email</label>
                <input id="email" type="email" class="field__input" formControlName="email"
                    placeholder="nombre@ejemplo.com" autocomplete="email" (input)="clearServerError('email')" />
                <span class="field__error" *ngIf="isFieldInvalid(email) || serverErrors.email">
                    {{ emailError }}
                </span>
            </div>

            <!-- Password -->
            <div class="field" [class.field--error]="isFieldInvalid(password) || serverErrors.password">
                <label class="field__label" for="password">Contraseña</label>
                <input id="password" type="password" class="field__input" formControlName="password"
                    placeholder="Mínimo 6 caracteres" autocomplete="new-password"
                    (input)="clearServerError('password')" />
                <span class="field__error" *ngIf="isFieldInvalid(password) || serverErrors.password">
                    {{ passwordError }}
                </span>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-submit" [disabled]="registerForm.invalid || isLoading"
                [class.btn-submit--loading]="isLoading">
                <span class="btn-submit__spinner" *ngIf="isLoading"></span>
                <span>{{ isLoading ? 'Registrando...' : 'Registrarse' }}</span>
            </button>

        </form>

        <p class="card__footer">
            ¿Ya tenés cuenta? <a routerLink="/login">Iniciá sesión</a>
        </p>
    </div>
</div>
